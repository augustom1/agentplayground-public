# ── AgentPlayground.net — Main Landing Page ─────────────────────
# Nginx virtual host served at agentplayground.net and www.agentplayground.net
# Traefik routes those hostnames here via the compose labels.
# ─────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    root /var/www/main;
    index index.html;

    # Serve static files, fallback to index.html for SPAs
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
